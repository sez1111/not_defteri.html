<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Not Defteri">
<meta name="theme-color" content="#1e3a5f">
<title>Not Defteri — Biyoloji</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p:#1e3a5f;--a:#0ea5e9;--t:#0d9488;--g:#64748b;--b:#cbd5e1;
  --gr:#16a34a;--ro:#f43f5e;--am:#f59e0b;--vi:#7c3aed;
  --bg:#f0f7ff;--white:#fff;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;font-size:14px;}
/* HEADER */
#hdr{background:var(--p);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
#hdr .ht{font-size:16px;font-weight:800;letter-spacing:-.3px;}
#hdr .hi{font-size:11px;color:#a8c8e8;}
.hbtns{display:flex;gap:6px;flex-wrap:wrap;}
/* TABS */
#tabs{background:#162d4a;padding:0 12px;display:flex;gap:4px;flex-wrap:wrap;border-bottom:2px solid rgba(255,255,255,.1);}
#tabs button{background:none;border:none;color:#7aa4c4;padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;}
#tabs button.active{color:#fff;border-bottom-color:var(--a);}
/* MAIN */
#main{max-width:1400px;margin:0 auto;padding:14px;}
/* CARDS */
.card{background:var(--white);border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
.ctitle{font-size:14px;font-weight:700;color:var(--p);margin-bottom:12px;}
/* TABS WITHIN PAGE */
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.stab{padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#f1f5f9;color:var(--g);font-family:inherit;transition:.15s;}
.stab.active{background:var(--p);color:#fff;}
/* TABLE */
table{width:100%;border-collapse:collapse;}
th{padding:7px 8px;text-align:center;font-size:11px;font-weight:600;white-space:nowrap;background:var(--p);color:#fff;}
th.left{text-align:left;}
td{padding:5px 8px;border-bottom:1px solid #f1f5f9;font-size:12px;text-align:center;}
td.left{text-align:left;font-weight:600;}
tr:hover td{background:#f8fafc;}
/* INPUT */
input[type=number],input[type=text],select{
  border:1.5px solid var(--b);border-radius:6px;padding:4px 6px;
  font-size:12px;font-family:inherit;outline:none;width:100%;
  text-align:center;background:#fffbeb;
}
input[type=number]:focus,input[type=text]:focus,select:focus{border-color:var(--a);background:#fff;}
input[type=number].ok{background:#dcfce7 !important;}
input[type=number].warn{background:#fee2e2 !important;}
/* BADGE */
.bdg{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;display:inline-block;}
.bgr{background:#dcfce7;color:#166534;} .bro{background:#fee2e2;color:#991b1b;}
.bam{background:#fef9c3;color:#92400e;} .bbl{background:#dbeafe;color:#1e40af;}
.bvi{background:#ede9fe;color:#5b21b6;}
/* SCORE CELL */
.sc-aa{color:#166534;font-weight:800;} .sc-ba{color:#16a34a;font-weight:700;}
.sc-bb{color:#0ea5e9;font-weight:700;} .sc-cb{color:#f59e0b;font-weight:700;}
.sc-cc{color:#f97316;font-weight:700;} .sc-ff{color:#f43f5e;font-weight:700;}
/* STAT CARDS */
.sgrid{display:grid;gap:10px;margin-bottom:12px;}
.sg3{grid-template-columns:repeat(3,1fr);}
.sg4{grid-template-columns:repeat(4,1fr);}
.sg6{grid-template-columns:repeat(6,1fr);}
.scard{background:var(--white);border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.slbl{font-size:11px;color:var(--g);margin-bottom:3px;}
.sval{font-size:22px;font-weight:800;color:var(--p);}
/* BTN */
.btn{display:inline-block;border:none;border-radius:7px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;color:#fff;white-space:nowrap;transition:.15s;}
.btn:hover{opacity:.85;}
.bp{background:var(--p);} .bt{background:var(--t);} .bg{background:var(--g);}
.br{background:var(--ro);} .bam2{background:var(--am);} .bv{background:var(--vi);}
.bsm{padding:4px 10px;font-size:11px;}
/* PAGE */
.page{display:none;} .page.active{display:block;}
/* PRINT */
@media print{
  #hdr,#tabs,.btn,.no-print{display:none!important;}
  .page{display:none!important;} .page.active{display:block!important;}
  .card{box-shadow:none;border:1px solid #e2e8f0;break-inside:avoid;}
  body{background:#fff;}
}
/* OVERLAY */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;}
#ov.show{display:flex;}
#ovbox{background:#fff;border-radius:14px;padding:22px;max-width:420px;width:90%;max-height:90vh;overflow-y:auto;}
#ov h3{font-size:15px;font-weight:700;color:var(--p);margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
label{font-size:12px;font-weight:600;color:var(--g);display:block;margin-bottom:3px;}
/* RESPONSIVE */
@media(max-width:600px){
  .sg6{grid-template-columns:repeat(3,1fr);}
  .sg4{grid-template-columns:repeat(2,1fr);}
  #main{padding:8px;}
}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="ht">📒 Not Defteri</div>
    <div class="hi" id="hdr-info">Yükleniyor...</div>
  </div>
  <div class="hbtns">
    <button class="btn bt bsm" onclick="yedekAl()">💾 Yedek Al</button>
    <button class="btn bg bsm" onclick="document.getElementById('yi').click()">📂 Yükle</button>
    <input type="file" id="yi" accept=".json,.html" style="display:none" onchange="yedekYukle(this)"/>
  </div>
</div>

<div id="grup-bar" style="background:#162d4a;padding:5px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.08);">
  <span style="font-size:11px;color:#7aa4c4;font-weight:600;">📂 GRUP:</span>
  <div id="grup-chips" style="display:flex;gap:4px;flex-wrap:wrap;flex:1;"></div>
  <button class="btn bsm" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);" onclick="yeniGrupAc()">+ Yeni Grup</button>
</div>
<div id="tabs">
  <button class="active" onclick="goTab('giris',this)">📝 Not Girişi</button>
  <button onclick="goTab('ozet',this)">📊 Özet</button>
  <button onclick="goTab('karsilastirma',this)">⚖️ Karşılaştırma</button>
  <button onclick="goTab('ogrenci',this)">👤 Öğrenci Kartı</button>
  <button onclick="goTab('ayarlar',this)">⚙️ Ayarlar</button>
</div>

<div id="main">
  <div id="pg-giris" class="page active"></div>
  <div id="pg-ozet" class="page"></div>
  <div id="pg-karsilastirma" class="page"></div>
  <div id="pg-ogrenci" class="page"></div>
  <div id="pg-ayarlar" class="page"></div>
</div>

<!-- Yeni Grup Overlay -->
<div id="yg-ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;padding:22px;max-width:480px;width:92%;max-height:90vh;overflow-y:auto;">
    <h3 style="font-size:15px;font-weight:700;color:#1e3a5f;margin-bottom:14px;">📂 Yeni Grup Oluştur</h3>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:3px;">Grup Adı</label>
      <input id="yg-ad" placeholder="Örn: 10. Sınıf 2026-2027" style="border:1.5px solid #cbd5e1;border-radius:7px;padding:7px 10px;font-size:13px;width:100%;"/>
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:3px;">Öğrenci Listesi</label>
      <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;">Format: <code>No | Ad | Soyad | Şube</code> — her satıra bir öğrenci</div>
      <textarea id="yg-liste" rows="10" style="border:1.5px solid #cbd5e1;border-radius:7px;padding:7px 10px;font-size:12px;font-family:monospace;width:100%;resize:vertical;" placeholder="582 | KADİR UMUT | YAPICI | 10-A&#10;714 | ATİLLA | ÖZLÜ | 10-A&#10;709 | ALPEREN | BAYSAL | 10-B"></textarea>
      <div id="yg-onizleme" style="font-size:12px;color:#64748b;margin-top:4px;"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn bg bsm" onclick="document.getElementById('yg-ov').style.display='none'">İptal</button>
      <button class="btn bp bsm" onclick="yeniGrupKaydet()">✅ Oluştur</button>
    </div>
  </div>
</div>

<!-- Öğrenci Düzenle Overlay -->
<div id="ov">
  <div id="ovbox">
    <h3 id="ov-baslik">Öğrenci Düzenle</h3>
    <div id="ov-form"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
      <button class="btn bg bsm" onclick="ovKapat()">İptal</button>
      <button class="btn bp bsm" onclick="ovKaydet()">✅ Kaydet</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── VERİ YAPISI ──────────────────────────────────────────────────────────────
// Öğrenci: {id, no, ad, soyad, sinif, donemler: {d1:{...}, d2:{...}}}
// Dönem: {y1,y2,q1,q2,q3,odev,kat,haz,sor,tut,sur,p1,p2}

var GRUPLAR = {}; // { grupId: { ad, ogrenciler, aktifDonem, aktifSinif } }
var AKTİF_GRUP = null;
var DATA = { ogrenciler: [], aktifDonem: 'd1', aktifSinif: '' };
var aktifOgrId = null;

// ── HESAPLAMALAR ──────────────────────────────────────────────────────────────
function yaziOrta(d) {
  var y1 = d.y1||0, y2 = d.y2||0;
  if (d.y1===null&&d.y2===null) return null;
  if (d.y1===null) return y2;
  if (d.y2===null) return y1;
  return (y1+y2)/2;
}
function quizOrta(d) {
  var vals = [d.q1,d.q2,d.q3].filter(function(v){return v!==null&&v!==undefined;});
  if (!vals.length) return null;
  return Math.max.apply(null,vals);
}
function performans(d) {
  var yo = yaziOrta(d), qo = quizOrta(d), ov = d.odev;
  if (yo===null&&qo===null&&ov===null) return null;
  return (yo||0)*0.3 + (qo||0)*0.6 + (ov||0)*0.1;
}
function genelDurum(d) {
  return (d.kat||0)+(d.haz||0)+(d.sor||0)+(d.tut||0)+(d.sur||0);
}
function sonPerformans(d) {
  var p = performans(d), gd = genelDurum(d);
  if (p===null) return null;
  return Math.min(100, p*0.8 + (gd*4)*0.2);
}
function genelOrtalama(d) {
  var yo = yaziOrta(d), p1 = d.p1, p2 = d.p2;
  var vals = [yo,p1,p2].filter(function(v){return v!==null&&v!==undefined;});
  if (!vals.length) return null;
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}
function notHarf(p) {
  if (p===null||p===undefined) return '—';
  if (p>=90) return 'AA'; if (p>=80) return 'BA'; if (p>=70) return 'BB';
  if (p>=60) return 'CB'; if (p>=50) return 'CC'; return 'FF';
}
function notClass(p) {
  if (p===null||p===undefined) return '';
  if (p>=90) return 'sc-aa'; if (p>=80) return 'sc-ba'; if (p>=70) return 'sc-bb';
  if (p>=60) return 'sc-cb'; if (p>=50) return 'sc-cc'; return 'sc-ff';
}
function fmt(v, dec) {
  if (v===null||v===undefined) return '—';
  return (+v).toFixed(dec!==undefined?dec:1);
}
function ort(arr) {
  var a = arr.filter(function(v){return v!==null&&v!==undefined;});
  if (!a.length) return null;
  return a.reduce(function(s,v){return s+v;},0)/a.length;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STORAGE ───────────────────────────────────────────────────────────────────
function kaydet() {
  if (AKTİF_GRUP) GRUPLAR[AKTİF_GRUP] = JSON.parse(JSON.stringify(DATA));
  localStorage.setItem('nd_gruplar', JSON.stringify(GRUPLAR));
  localStorage.setItem('nd_aktif', AKTİF_GRUP||'');
}
function yukle() {
  try {
    var g = localStorage.getItem('nd_gruplar');
    if (g) GRUPLAR = JSON.parse(g);
    var a = localStorage.getItem('nd_aktif');
    if (a && GRUPLAR[a]) {
      AKTİF_GRUP = a;
      Object.assign(DATA, GRUPLAR[a]);
    } else if (Object.keys(GRUPLAR).length) {
      AKTİF_GRUP = Object.keys(GRUPLAR)[0];
      Object.assign(DATA, GRUPLAR[AKTİF_GRUP]);
    }
  } catch(e) {}
}

// ── YARDIMCILAR ───────────────────────────────────────────────────────────────
function getSiniflar() {
  var s = {};
  DATA.ogrenciler.forEach(function(o){ s[o.sinif]=1; });
  return Object.keys(s).sort();
}
function getSinifOgr(sinif, donem) {
  return DATA.ogrenciler.filter(function(o){
    return (!sinif||o.sinif===sinif);
  });
}
function goTab(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('#tabs button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('pg-'+name).classList.add('active');
  btn.classList.add('active');
  renderPage(name);
}
function renderAll() {
  var active = document.querySelector('#tabs button.active');
  var name = active ? active.getAttribute('onclick').match(/goTab\('(\w+)'/)[1] : 'giris';
  renderPage(name);
  updateHeader();
}
function renderPage(name) {
  if (name==='giris') renderGiris();
  else if (name==='ozet') renderOzet();
  else if (name==='karsilastirma') renderKarsilastirma();
  else if (name==='ogrenci') renderOgrenci();
  else if (name==='ayarlar') renderAyarlar();
}
function updateHeader() {
  var donemAd = DATA.aktifDonem==='d1'?'I. Dönem':'II. Dönem';
  var g = AKTİF_GRUP && GRUPLAR[AKTİF_GRUP];
  var grupAd = g ? g.ad : '';
  document.getElementById('hdr-info').textContent =
    (grupAd?grupAd+' · ':'')+DATA.ogrenciler.length + ' öğrenci · ' + donemAd;
}

// ── NOT GİRİŞİ ────────────────────────────────────────────────────────────────
function renderGiris() {
  var siniflar = getSiniflar();
  if (!DATA.aktifSinif || siniflar.indexOf(DATA.aktifSinif)===-1) DATA.aktifSinif = siniflar[0]||'';

  var h = '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;">';
  h += '<div class="ctitle" style="margin:0;">📝 Not Girişi</div>';
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
  // Dönem seçici
  h += '<div style="display:flex;gap:4px;">';
  ['d1','d2'].forEach(function(d){
    var lbl = d==='d1'?'I. Dönem':'II. Dönem';
    var act = DATA.aktifDonem===d;
    h += '<button class="btn bsm '+(act?'bp':'bg')+'" onclick="setDonem(\''+d+'\')">'+(act?'● ':'')+lbl+'</button>';
  });
  h += '</div>';
  h += '<button class="btn bam2 bsm" onclick="window.print()">🖨️ Yazdır</button>';
  h += '</div></div>';

  // Şube tabları
  h += '<div class="stabs">';
  siniflar.forEach(function(s){
    h += '<button class="stab'+(s===DATA.aktifSinif?' active':'')+'" onclick="setSinif(\''+s+'\')">' + s + '</button>';
  });
  h += '</div></div>';

  // Tablo
  var ogr = DATA.ogrenciler.filter(function(o){return o.sinif===DATA.aktifSinif;});
  var donem = DATA.aktifDonem;

  h += '<div class="card"><div style="overflow-x:auto;"><table>';
  h += '<thead><tr>';
  h += '<th class="left" style="min-width:140px;">Ad Soyad</th>';
  h += '<th>No</th>';
  // Yazılılar
  h += '<th colspan="3" style="background:#1a3650;border-bottom:2px solid var(--a);">📝 YAZILI</th>';
  // Quizler
  h += '<th colspan="4" style="background:#1a3650;border-bottom:2px solid var(--t);">⚡ QUİZ</th>';
  // Ödev + Performans
  h += '<th style="background:#1a3650;border-bottom:2px solid var(--am);">📚</th>';
  h += '<th colspan="5" style="background:#1a3650;border-bottom:2px solid var(--vi);">👤 GENEL DURUM</th>';
  // Sonuçlar
  h += '<th colspan="5" style="background:#0d4f3f;border-bottom:2px solid var(--gr);">📊 SONUÇLAR</th>';
  h += '</tr><tr>';
  h += '<th class="left">Ad Soyad</th><th>No</th>';
  h += '<th>Yz-1</th><th>Yz-2</th><th>YzOrt</th>';
  h += '<th>Qz-1</th><th>Qz-2</th><th>Qz-3</th><th>QzMax</th>';
  h += '<th>Ödev</th>';
  h += '<th title="Derse Katılım">Kat</th><th title="Derse Hazırlık">Haz</th><th title="Sorumluluk">Sor</th><th title="Tutum Davranış">Tut</th><th title="Süreklilik">Sür</th>';
  h += '<th title="Son Performans">S.Perf</th><th>P1</th><th>P2</th><th>G.Ort</th><th>Harf</th>';
  h += '</tr></thead><tbody>';

  ogr.forEach(function(o, i) {
    var d = (o.donemler && o.donemler[donem]) || emptyDonem();
    var yo = yaziOrta(d), qo = quizOrta(d), sp = sonPerformans(d), go = genelOrtalama(d);
    var bg = i%2===0?'#fff':'#f8fafc';
    h += '<tr style="background:'+bg+'">';
    h += '<td class="left" style="cursor:pointer;" onclick="ogrDuzenle(\''+o.id+'\')">'+esc(o.ad)+' '+esc(o.soyad)+'</td>';
    h += '<td>'+esc(o.no)+'</td>';
    // Yazılılar
    h += '<td>'+ninput(o.id,donem,'y1',d.y1,100)+'</td>';
    h += '<td>'+ninput(o.id,donem,'y2',d.y2,100)+'</td>';
    h += '<td style="font-weight:700;color:var(--a);">'+fmt(yo)+'</td>';
    // Quizler
    h += '<td>'+ninput(o.id,donem,'q1',d.q1,100)+'</td>';
    h += '<td>'+ninput(o.id,donem,'q2',d.q2,100)+'</td>';
    h += '<td>'+ninput(o.id,donem,'q3',d.q3,100)+'</td>';
    h += '<td style="font-weight:700;color:var(--t);">'+fmt(qo,0)+'</td>';
    // Ödev
    h += '<td>'+ninput(o.id,donem,'odev',d.odev,100)+'</td>';
    // Genel durum (1-5)
    ['kat','haz','sor','tut','sur'].forEach(function(k){
      h += '<td>'+ninput(o.id,donem,k,d[k],5,1)+'</td>';
    });
    // Sonuçlar
    h += '<td style="font-weight:700;color:var(--vi);">'+fmt(sp)+'</td>';
    h += '<td>'+ninput(o.id,donem,'p1',d.p1,100)+'</td>';
    h += '<td>'+ninput(o.id,donem,'p2',d.p2,100)+'</td>';
    h += '<td class="'+notClass(go)+'" style="font-size:13px;">'+fmt(go)+'</td>';
    h += '<td><span class="bdg '+(go>=60?'bgr':'bro')+'">'+notHarf(go)+'</span></td>';
    h += '</tr>';
  });

  h += '</tbody></table></div></div>';
  document.getElementById('pg-giris').innerHTML = h;
}

function ninput(ogrId, donem, key, val, max, step) {
  var v = val!==null&&val!==undefined ? val : '';
  var cls = v!=='' ? (v>=max*0.85?'ok':'') : '';
  return '<input type="number" min="0" max="'+max+'" step="'+(step||1)+'" value="'+v+'" class="'+cls+'" '
    +'style="width:'+(max<=5?'42px':'58px')+';" '
    +'onchange="setNot(\''+ogrId+'\',\''+donem+'\',\''+key+'\',this)" '
    +'onblur="this.value=this.value===\'\'?\'\':Math.min('+max+',Math.max(0,+this.value));setNot(\''+ogrId+'\',\''+donem+'\',\''+key+'\',this)"/>';
}

function emptyDonem() {
  return {y1:null,y2:null,q1:null,q2:null,q3:null,odev:null,
          kat:null,haz:null,sor:null,tut:null,sur:null,p1:null,p2:null};
}

function setDonem(d) {
  DATA.aktifDonem = d; kaydet(); renderGiris();
}
function setSinif(s) {
  DATA.aktifSinif = s; kaydet();
  document.querySelectorAll('#pg-giris .stab').forEach(function(b){
    b.classList.toggle('active', b.textContent===s);
  });
  renderGiris();
}

function setNot(ogrId, donem, key, input) {
  var o = DATA.ogrenciler.find(function(x){return x.id===ogrId;});
  if (!o) return;
  if (!o.donemler) o.donemler = {};
  if (!o.donemler[donem]) o.donemler[donem] = emptyDonem();
  var v = input.value===''?null:parseFloat(input.value);
  o.donemler[donem][key] = v;
  kaydet();
  // Hesaplanan sütunları güncelle
  var d = o.donemler[donem];
  var row = input.closest('tr');
  if (!row) return;
  var cells = row.querySelectorAll('td');
  // YzOrt = index 4, QzMax = 8, S.Perf = 15, G.Ort = 18
  cells[4].textContent = fmt(yaziOrta(d));
  cells[8].textContent = fmt(quizOrta(d),0);
  cells[15].textContent = fmt(sonPerformans(d));
  cells[18].className = notClass(genelOrtalama(d));
  cells[18].style.fontSize = '13px';
  cells[18].textContent = fmt(genelOrtalama(d));
  cells[19].innerHTML = '<span class="bdg '+(genelOrtalama(d)>=60?'bgr':'bro')+'">'+notHarf(genelOrtalama(d))+'</span>';
}

// ── ÖZET ──────────────────────────────────────────────────────────────────────
function renderOzet() {
  var donem = DATA.aktifDonem;
  var siniflar = getSiniflar();
  var tumOgr = DATA.ogrenciler;
  var golar = tumOgr.map(function(o){
    var d = o.donemler&&o.donemler[donem]; return d?genelOrtalama(d):null;
  }).filter(function(v){return v!==null;});

  var h = '<div class="card"><div class="ctitle">📊 Genel Özet — '+(donem==='d1'?'I. Dönem':'II. Dönem')+'</div>';
  h += '<div class="sgrid sg4">';
  var mean = ort(golar)||0;
  var std = golar.length ? Math.sqrt(golar.reduce(function(s,v){return s+(v-mean)*(v-mean);},0)/golar.length) : 0;
  var gec = golar.filter(function(v){return v>=50;}).length;
  [
    ['Değerlendirilen',golar.length,'var(--p)'],
    ['Genel Ortalama',mean.toFixed(1),'var(--a)'],
    ['Std. Sapma',std.toFixed(1),'var(--vi)'],
    ['Geçen (≥50)','%'+Math.round(gec/golar.length*100)||0,'var(--t)']
  ].forEach(function(x){
    h += '<div class="scard" style="border-top:3px solid '+x[2]+';"><div class="slbl">'+x[0]+'</div><div class="sval" style="color:'+x[2]+';">'+x[1]+'</div></div>';
  });
  h += '</div>';

  // Şube tablosu
  h += '<div class="card"><div class="ctitle">🏫 Şube Özeti</div><div style="overflow-x:auto;"><table>';
  h += '<thead><tr><th class="left">Şube</th><th>Öğrenci</th><th>Ort.</th><th>Std.Sap</th><th>En Yük.</th><th>En Düş.</th><th>Geçen</th><th>Başarı%</th></tr></thead><tbody>';
  siniflar.forEach(function(s,i){
    var ogr = tumOgr.filter(function(o){return o.sinif===s;});
    var vals = ogr.map(function(o){
      var d=o.donemler&&o.donemler[donem]; return d?genelOrtalama(d):null;
    }).filter(function(v){return v!==null;});
    if (!vals.length) { h+='<tr><td class="left" style="font-weight:700;">'+s+'</td><td colspan="7" style="color:var(--g);font-size:12px;">Not girilmemiş</td></tr>'; return; }
    var sm=ort(vals)||0, ss=Math.sqrt(vals.reduce(function(x,v){return x+(v-sm)*(v-sm);},0)/vals.length);
    var gec2=vals.filter(function(v){return v>=50;}).length;
    h += '<tr style="background:'+(i%2===0?'#fff':'#f8fafc')+'">';
    h += '<td class="left" style="font-weight:700;">'+s+'</td><td>'+vals.length+'</td>';
    h += '<td style="font-weight:700;color:'+(sm>=60?'var(--gr)':'var(--ro)')+';">'+sm.toFixed(1)+'</td>';
    h += '<td>'+ss.toFixed(1)+'</td>';
    h += '<td>'+Math.max.apply(null,vals).toFixed(1)+'</td>';
    h += '<td>'+Math.min.apply(null,vals).toFixed(1)+'</td>';
    h += '<td>'+gec2+'</td>';
    h += '<td><span class="bdg '+(gec2/vals.length>=0.6?'bgr':'bro')+'">%'+Math.round(gec2/vals.length*100)+'</span></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';

  // Not dağılımı
  var dag = [['AA',90,100],['BA',80,89],['BB',70,79],['CB',60,69],['CC',50,59],['FF',0,49]].map(function(x){
    return {harf:x[0], n:golar.filter(function(v){return v>=x[1]&&v<=x[2];}).length};
  });
  h += '<div class="card"><div class="ctitle">📊 Not Dağılımı</div>';
  h += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
  dag.forEach(function(x){
    var pct = golar.length?Math.round(x.n/golar.length*100):0;
    var col = x.harf==='FF'?'#f43f5e':x.harf==='CC'||x.harf==='CB'?'#f59e0b':'#16a34a';
    h += '<div class="scard" style="border-top:3px solid '+col+';min-width:80px;flex:1;">';
    h += '<div class="slbl">'+x.harf+'</div>';
    h += '<div class="sval" style="color:'+col+';">'+x.n+'</div>';
    h += '<div style="font-size:11px;color:var(--g);">%'+pct+'</div>';
    h += '</div>';
  });
  h += '</div></div>';

  // Sıralama
  var sorted = tumOgr.map(function(o){
    var d=o.donemler&&o.donemler[donem]; var go=d?genelOrtalama(d):null;
    return{o:o,go:go};
  }).filter(function(x){return x.go!==null;}).sort(function(a,b){return b.go-a.go;});

  h += '<div class="card"><div class="ctitle">🏆 Genel Sıralama</div><div style="overflow-x:auto;"><table>';
  h += '<thead><tr><th>#</th><th>No</th><th class="left">Ad Soyad</th><th>Şube</th><th>YzOrt</th><th>QzMax</th><th>S.Perf</th><th>G.Ort</th><th>Harf</th></tr></thead><tbody>';
  sorted.forEach(function(x,i){
    var o=x.o, d=o.donemler[donem];
    h += '<tr style="background:'+(i%2===0?'#fff':'#f8fafc')+'">';
    h += '<td style="color:var(--g);font-weight:700;">'+(i+1)+'</td>';
    h += '<td>'+esc(o.no)+'</td>';
    h += '<td class="left">'+esc(o.ad)+' '+esc(o.soyad)+'</td>';
    h += '<td>'+esc(o.sinif)+'</td>';
    h += '<td>'+fmt(yaziOrta(d))+'</td>';
    h += '<td>'+fmt(quizOrta(d),0)+'</td>';
    h += '<td>'+fmt(sonPerformans(d))+'</td>';
    h += '<td class="'+notClass(x.go)+'" style="font-weight:800;font-size:13px;">'+fmt(x.go)+'</td>';
    h += '<td><span class="bdg '+(x.go>=60?'bgr':'bro')+'">'+notHarf(x.go)+'</span></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';
  document.getElementById('pg-ozet').innerHTML = h;
}

  });

    var ogr = DATA.ogrenciler.filter(function(o){return o.sinif===s;});

      return ogr.map(function(o){var d=o.donemler&&o.donemler[donem]; return d?fn(d):null;}).filter(function(v){return v!==null;});
    };
    var yv=getVals(yaziOrta),qv=getVals(quizOrta),ov=getVals(function(d){return d.odev;}),

  });
  h += '</tbody></table></div></div>';

    .sort(function(a,b){return a.soyad.localeCompare(b.soyad,'tr');})

      sel.innerHTML += '<option value="'+o.id+'">'+esc(o.no)+' — '+esc(o.ad)+' '+esc(o.soyad)+'</option>';

function okGoster(){
  var id = document.getElementById('ok-ogr').value;
  aktifOgrId = id;
  var cont = document.getElementById('ok-icerik');
  if (!id) { cont.innerHTML='<div style="text-align:center;padding:40px;color:var(--g);">Öğrenci seçin.</div>'; return; }
  var o = DATA.ogrenciler.find(function(x){return x.id===id;});
  if (!o) return;

  var h = '<div style="background:linear-gradient(135deg,var(--p),var(--t));color:#fff;border-radius:12px;padding:18px;margin-bottom:12px;">';
  h += '<div style="font-size:20px;font-weight:800;">'+esc(o.ad)+' '+esc(o.soyad)+'</div>';
  h += '<div style="font-size:13px;opacity:.8;margin-top:4px;">No: '+esc(o.no)+' · Şube: '+esc(o.sinif)+'</div></div>';

  // Her iki dönem
  var donemler = [{id:'d1',ad:'I. Dönem'},{id:'d2',ad:'II. Dönem'}];
  h += '<div class="sgrid sg3">';
  donemler.forEach(function(dn){
    var d = o.donemler&&o.donemler[dn.id];
    var go = d?genelOrtalama(d):null;
    h += '<div class="scard" style="border-top:3px solid '+(go&&go>=60?'var(--gr)':'var(--am)')+';">';
    h += '<div class="slbl">'+dn.ad+' Genel Ort.</div>';
    h += '<div class="sval '+notClass(go)+'">'+fmt(go)+'</div>';
    h += '<div style="font-size:12px;color:var(--g);">'+notHarf(go)+'</div>';
    h += '</div>';
  });
  // Genel yıl ortalaması
  var yilVals = donemler.map(function(dn){var d=o.donemler&&o.donemler[dn.id]; return d?genelOrtalama(d):null;}).filter(function(v){return v!==null;});
  var yilOrt = ort(yilVals);
  h += '<div class="scard" style="border-top:3px solid var(--p);">';
  h += '<div class="slbl">Yıl Ortalaması</div>';
  h += '<div class="sval '+notClass(yilOrt)+'">'+fmt(yilOrt)+'</div>';
  h += '<div style="font-size:12px;color:var(--g);">'+notHarf(yilOrt)+'</div>';
  h += '</div></div>';

  // Detay tablo
  donemler.forEach(function(dn){
    var d = o.donemler&&o.donemler[dn.id];
    if (!d) return;
    var yo=yaziOrta(d),qo=quizOrta(d),p=performans(d),gd=genelDurum(d),sp=sonPerformans(d),go=genelOrtalama(d);
    h += '<div class="card"><div class="ctitle">'+dn.ad+' Detayı</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:10px;">';
    [
      ['Yazılı-1',d.y1],['Yazılı-2',d.y2],['Yz.Ort.',yo],
      ['Quiz Max',qo],['Ödev',d.odev],['Performans',p],
      ['Genel Durum',gd+'/25'],['Son Perf.',sp],['Genel Ort.',go]
    ].forEach(function(x){
      h += '<div class="scard"><div class="slbl">'+x[0]+'</div>';
      h += '<div style="font-size:18px;font-weight:800;color:var(--p);">'+fmt(typeof x[1]==='string'?parseFloat(x[1]):x[1])+'</div></div>';
    });
    h += '</div>';
    // Genel durum detayı
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;font-size:12px;">';
    [['Katılım',d.kat],['Hazırlık',d.haz],['Sorumluluk',d.sor],['Tutum',d.tut],['Süreklilik',d.sur]].forEach(function(x){
      h += '<span style="background:#f1f5f9;padding:3px 10px;border-radius:6px;">'+x[0]+': <b>'+fmt(x[1],0)+'</b>/5</span>';
    });
    h += '</div>';
    // Performans notları
    h += '<div style="margin-top:10px;font-size:12px;color:var(--g);">Performans Notları: <b style="color:var(--p);">P1: '+fmt(d.p1)+'</b> &nbsp; <b style="color:var(--p);">P2: '+fmt(d.p2)+'</b></div>';
    h += '</div>';
  });

  // Sınıf karşılaştırması (aktif dönem)
  var donem = DATA.aktifDonem;
  var sinifOgr = DATA.ogrenciler.filter(function(x){return x.sinif===o.sinif;});
  var sinifVals = sinifOgr.map(function(x){var d=x.donemler&&x.donemler[donem]; return d?genelOrtalama(d):null;}).filter(function(v){return v!==null;});
  var ogrGo = o.donemler&&o.donemler[donem]?genelOrtalama(o.donemler[donem]):null;
  if (ogrGo!==null&&sinifVals.length) {
    var sinifOrt = ort(sinifVals)||0;
    var siralama = sinifVals.filter(function(v){return v>ogrGo;}).length+1;
    var pct = Math.round((1-(siralama-1)/sinifVals.length)*100);
    h += '<div class="card"><div class="ctitle">📈 Sınıf Karşılaştırması ('+(donem==='d1'?'I. Dönem':'II. Dönem')+')</div>';
    h += '<div class="sgrid sg3">';
    [{l:'Öğrenci',v:ogrGo.toFixed(1),c:'var(--p)'},{l:o.sinif+' Ort.',v:sinifOrt.toFixed(1),c:'var(--a)'},{l:'Sıralama',v:siralama+'. / %'+pct,c:'var(--t)'}].forEach(function(x){
      h += '<div class="scard"><div class="slbl">'+x.l+'</div><div style="font-size:18px;font-weight:800;color:'+x.c+';">'+x.v+'</div></div>';
    });
    h += '</div></div>';
  }

  cont.innerHTML = h;
}

// ── YEDEK ──────────────────────────────────────────────────────────────────────
function yedekAl() {
  try {
    kaydet(); var veri = { nd_gruplar: localStorage.getItem('nd_gruplar'), nd_aktif: localStorage.getItem('nd_aktif'), nd_okul: localStorage.getItem('nd_okul') };
    var xhr = new XMLHttpRequest();
    xhr.open('GET', window.location.href, false);
    xhr.send();
    var html = xhr.responseText;
    html = html.replace(/\/\/ __ND_AUTOLOAD_START__[\s\S]*?\/\/ __ND_AUTOLOAD_END__/g, '');
    var autoload = '// __ND_AUTOLOAD_START__\n(function(){\n' +
      '  var v='+JSON.stringify(veri)+';\n' +
      '  Object.keys(v).forEach(function(k){ if(v[k]&&!localStorage.getItem(k)) localStorage.setItem(k,v[k]); });\n' +
      '})();\n// __ND_AUTOLOAD_END__';
    html = html.replace("'use strict';", "'use strict';\n"+autoload);
    var tarih = new Date().toLocaleDateString('tr-TR').replace(/\./g,'-');
    var blob = new Blob([html],{type:'text/html'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download='not_defteri_'+tarih+'.html'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    var fallback = {versiyon:1,veri:{nd_data:localStorage.getItem('nd_data'),nd_okul:localStorage.getItem('nd_okul')}};
    var b2 = new Blob([JSON.stringify(fallback,null,2)],{type:'application/json'});
    var u2 = URL.createObjectURL(b2);
    var a2 = document.createElement('a');
    a2.href=u2; a2.download='not_defteri_yedek.json'; a2.click();
    URL.revokeObjectURL(u2);
  }
}

function yedekYukle(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result;
      if(file.name.endsWith('.json')){
        var y=JSON.parse(text);
        var veri=y.veri||y;
        Object.keys(veri).forEach(function(k){ if(veri[k]!==null&&veri[k]!==undefined) localStorage.setItem(k,veri[k]); });
      } else {
        // HTML dosyası — localStorage anahtarlarını içindeki JSON'dan çek
        var m=text.match(/var v=(\{[^;]+\});/);
        if(m){ var veri=JSON.parse(m[1]); Object.keys(veri).forEach(function(k){if(veri[k])localStorage.setItem(k,veri[k]);}); }
        else { alert('Geçerli yedek bulunamadı.'); return; }
      }
      alert('Yüklendi!');
      location.reload();
    } catch(err){ alert('Hata: '+err.message); }

    '<div><label>Şube</label><input id="ov-sinif" value="'+esc(o.sinif)+'"/></div>'+
    '</div>';
  document.getElementById('ov').classList.add('show');
  document.getElementById('ov').dataset.id=id;
}
function ovKapat(){ document.getElementById('ov').classList.remove('show'); }
function ovKaydet(){
  var id=document.getElementById('ov').dataset.id;
  var o=DATA.ogrenciler.find(function(x){return x.id===id;}); if(!o) return;
  o.ad=document.getElementById('ov-ad').value.trim();

  o.no=document.getElementById('ov-no').value.trim();
  o.sinif=document.getElementById('ov-sinif').value.trim();
  kaydet(); ovKapat(); renderAll();
}

// ── GRUP SİSTEMİ ──────────────────────────────────────────────────────────────
function renderGrupBar() {
  var chips = document.getElementById('grup-chips');
  if (!chips) return;
  chips.innerHTML = '';
  Object.keys(GRUPLAR).forEach(function(gid) {
    var g = GRUPLAR[gid];
    var aktif = gid === AKTİF_GRUP;
    var btn = document.createElement('button');
    btn.textContent = g.ad;
    btn.className = 'btn bsm';
    btn.style.cssText = aktif
      ? 'background:var(--a);color:#fff;border:none;'
      : 'background:rgba(255,255,255,.12);color:#a8c8e8;border:1px solid rgba(255,255,255,.15);';
    btn.onclick = function(){ grupSec(gid); };
    chips.appendChild(btn);
    // Sil butonu (tek grup varsa gizle)
    if (Object.keys(GRUPLAR).length > 1) {
      var del = document.createElement('button');
      del.textContent = '×';
      del.title = 'Grubu Sil';
      del.style.cssText = 'background:rgba(244,63,94,.4);color:#fff;border:none;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:13px;margin-left:-2px;margin-right:4px;';
      del.onclick = function(e){ e.stopPropagation(); grupSil(gid); };
      chips.appendChild(del);
    }
  });
}

function grupSec(gid) {
  if (!GRUPLAR[gid]) return;
  // Mevcut grubu kaydet
  if (AKTİF_GRUP) GRUPLAR[AKTİF_GRUP] = JSON.parse(JSON.stringify(DATA));
  AKTİF_GRUP = gid;
  Object.assign(DATA, JSON.parse(JSON.stringify(GRUPLAR[gid])));
  localStorage.setItem('nd_aktif', gid);
  localStorage.setItem('nd_gruplar', JSON.stringify(GRUPLAR));
  if (!DATA.aktifSinif) DATA.aktifSinif = getSiniflar()[0]||'';
  renderGrupBar();
  renderAll();
  updateHeader();
}

function grupSil(gid) {
  if (!confirm('Bu grup ve tüm verileri silinecek. Emin misiniz?')) return;
  delete GRUPLAR[gid];
  if (AKTİF_GRUP === gid) {
    AKTİF_GRUP = Object.keys(GRUPLAR)[0]||null;
    if (AKTİF_GRUP) Object.assign(DATA, GRUPLAR[AKTİF_GRUP]);
  }
  localStorage.setItem('nd_gruplar', JSON.stringify(GRUPLAR));
  localStorage.setItem('nd_aktif', AKTİF_GRUP||'');
  renderGrupBar();
  renderAll();
}

function yeniGrupAc() {
  document.getElementById('yg-ad').value = '';
  document.getElementById('yg-liste').value = '';
  document.getElementById('yg-onizleme').textContent = '';
  document.getElementById('yg-ov').style.display = 'flex';
  document.getElementById('yg-liste').oninput = function() {
    var lines = this.value.trim().split('\n').filter(function(l){ return l.trim(); });
    document.getElementById('yg-onizleme').textContent = lines.length + ' öğrenci algılandı';
  };
}

function yeniGrupKaydet() {
  var ad = document.getElementById('yg-ad').value.trim();
  var liste = document.getElementById('yg-liste').value.trim();
  if (!ad) { alert('Grup adı girin.'); return; }
  if (!liste) { alert('Öğrenci listesi girin.'); return; }

  var ogrenciler = [];
  liste.split('\n').forEach(function(line, idx) {
    line = line.trim();
    if (!line) return;
    var p = line.split(/[|,\t]/).map(function(x){ return x.trim(); });
    if (p.length < 2) return;
    var no = p[0], ad2 = p[1]||'', soyad = p[2]||'', sinif = p[3]||'';
    // Tek kelimeyse ad+soyad birleşik olabilir
    if (p.length === 2) {
      var w = p[1].split(' ');
      soyad = w.pop()||'';
      ad2 = w.join(' ');
    }
    ogrenciler.push({
      id: 'o_'+no+'_'+Date.now()+'_'+idx,
      no: no, ad: ad2, soyad: soyad, sinif: sinif,
      cinsiyet: '', pansiyonlu: false, devamsizlik: 0, donemler: {}
    });
  });

  if (!ogrenciler.length) { alert('Geçerli öğrenci bulunamadı.'); return; }

  var gid = 'g_' + Date.now();
  GRUPLAR[gid] = { ad: ad, ogrenciler: ogrenciler, aktifDonem: 'd1', aktifSinif: ogrenciler[0]&&ogrenciler[0].sinif||'' };

  // Mevcut grubu kaydet
  if (AKTİF_GRUP) GRUPLAR[AKTİF_GRUP] = JSON.parse(JSON.stringify(DATA));

  AKTİF_GRUP = gid;
  Object.assign(DATA, JSON.parse(JSON.stringify(GRUPLAR[gid])));
  localStorage.setItem('nd_gruplar', JSON.stringify(GRUPLAR));
  localStorage.setItem('nd_aktif', gid);

  document.getElementById('yg-ov').style.display = 'none';
  renderGrupBar();
  renderAll();
  updateHeader();
  alert(ogrenciler.length + ' öğrenci ile grup oluşturuldu!');
}
